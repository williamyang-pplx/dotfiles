# Personal tmux config.
#
# Devboxes are commonly accessed through the SSH gateway from laptop terminals,
# so enable mouse support by default. Without this, wheel scrolling inside tmux
# looks broken on fresh devboxes even though the SSH proxy is passing input
# through correctly.
set -g mouse on

# Leader/prefix key: keep the default ctrl-b, and ALSO accept ctrl-\ as an
# additive secondary leader (prefix2) for people who prefer it. ctrl-b is set
# explicitly (not just left as the default) so reloading this config over a
# session that previously rebound the prefix restores it. Neither key is
# unbound, so both work. The send-prefix binding lets a literal ctrl-\ reach
# apps / nested tmux sessions.
set -g prefix C-b
set -g prefix2 'C-\'
bind 'C-\' send-prefix -2

# Don't wait after ESC. Default is 500ms, which adds a noticeable lag in vim
# and other ESC-driven apps over SSH. 10ms is enough to disambiguate.
set -sg escape-time 10

# Large scrollback so piped command output isn't truncated.
set -g history-limit 50000

# True-color / 256-color passthrough so colors render correctly over SSH.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"

# Forward focus events to apps inside tmux (vim autoread, etc.).
set -g focus-events on

# Let apps (e.g. nvim) set the system clipboard via OSC52, and forward tmux's
# own copy-mode yanks the same way. This is what makes yanking inside an SSH
# session land in the laptop's clipboard (terminal must support OSC52).
set -g set-clipboard on

# Reload config without restarting tmux: <prefix> r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splits that open in the current pane's working directory.
# | splits vertically, - splits horizontally; the default % and " still work.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Minimal, readable status bar.
set -g status-style "bg=colour236,fg=colour250"
set -g status-left "#[bg=colour39,fg=colour16,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=colour244]#H #[fg=colour250]%H:%M "
set -g window-status-current-style "fg=colour39,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
